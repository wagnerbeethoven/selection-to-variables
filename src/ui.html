<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Selection to Variables</title>
    <style>
      :root {
        --plugin-accent: #007a7a;
        --plugin-accent-hover: #006262;
        --plugin-accent-subtle: rgba(0, 122, 122, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font: 12px/1.5 "Inter", "Segoe UI", system-ui, sans-serif;
        background: var(--figma-color-bg);
        color: var(--figma-color-text);
      }

      .app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px 8px;
        border-bottom: 1px solid var(--figma-color-border);
        flex-shrink: 0;
      }

      .header-title {
        font-size: 13px;
        font-weight: 600;
      }

      /* ── Stepper ── */
      .stepper {
        display: flex;
        align-items: center;
        padding: 11px 16px;
        border-bottom: 1px solid var(--figma-color-border);
        flex-shrink: 0;
      }

      .step {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }

      .step-dot {
        width: 22px;
        height: 22px;
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        flex-shrink: 0;
        border: 1.5px solid var(--figma-color-border);
        background: var(--figma-color-bg);
        color: var(--figma-color-text-secondary);
        transition: background 140ms, border-color 140ms, color 140ms;
      }

      .step[data-state="active"] .step-dot {
        background: var(--plugin-accent);
        border-color: var(--plugin-accent);
        color: #fff;
      }

      .step[data-state="done"] .step-dot {
        background: var(--figma-color-bg-success, #1a7f5a);
        border-color: transparent;
        color: #fff;
      }

      .step-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--figma-color-text-secondary);
        white-space: nowrap;
      }

      .step[data-state="active"] .step-label {
        color: var(--figma-color-text);
        font-weight: 600;
      }

      .step-connector {
        height: 1px;
        flex: 1;
        background: var(--figma-color-border);
        margin: 0 8px;
      }

      /* ── Content ── */
      .content {
        flex: 1;
        overflow-y: auto;
        padding: 14px;
      }

      .step-panel {
        display: none;
      }

      .step-panel[data-active="true"] {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* ── Form ── */
      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .field-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--figma-color-text-secondary);
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 7px 9px;
        border: 1px solid var(--figma-color-border);
        border-radius: 6px;
        background: var(--figma-color-bg-secondary);
        color: var(--figma-color-text);
        font: inherit;
        outline: none;
        transition: border-color 120ms;
      }

      input:focus,
      select:focus {
        border-color: var(--plugin-accent);
      }

      .row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .hidden {
        display: none !important;
      }

      /* ── Buttons ── */
      button {
        cursor: pointer;
        border: 1px solid var(--figma-color-border);
        border-radius: 6px;
        background: var(--figma-color-bg-secondary);
        color: var(--figma-color-text);
        padding: 7px 14px;
        font: inherit;
        font-weight: 500;
        font-size: 12px;
        transition: background 100ms, opacity 100ms;
        white-space: nowrap;
      }

      button:hover:not(:disabled) {
        background: var(--figma-color-bg-tertiary, var(--figma-color-bg-secondary));
      }

      button:disabled {
        opacity: 0.38;
        cursor: not-allowed;
      }

      button[data-loading="true"] {
        position: relative;
        padding-left: 30px;
      }

      button[data-loading="true"]::before {
        content: "";
        position: absolute;
        left: 10px;
        top: 50%;
        width: 12px;
        height: 12px;
        margin-top: -6px;
        border-radius: 999px;
        border: 1.5px solid rgba(255, 255, 255, 0.3);
        border-top-color: currentColor;
        animation: spin 0.7s linear infinite;
      }

      .btn-primary {
        background: var(--plugin-accent);
        border-color: transparent;
        color: #fff;
      }

      .btn-primary:hover:not(:disabled) {
        background: var(--plugin-accent-hover);
      }

      .btn-ghost {
        background: transparent;
        border-color: transparent;
        color: var(--figma-color-text-secondary);
      }

      .btn-ghost:hover:not(:disabled) {
        background: var(--figma-color-bg-secondary);
        color: var(--figma-color-text);
        border-color: transparent;
      }

      /* ── Status bar ── */
      .status-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 6px;
        background: var(--figma-color-bg-secondary);
        border: 1px solid var(--figma-color-border);
        font-size: 12px;
        color: var(--figma-color-text-secondary);
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--figma-color-border);
        flex-shrink: 0;
        transition: background 200ms;
      }

      .status-dot[data-state="busy"] {
        background: var(--plugin-accent);
        animation: pulse 1.2s infinite;
      }

      .status-dot[data-state="warning"] {
        background: var(--figma-color-text-warning, #f5a623);
      }

      .status-dot[data-state="error"] {
        background: var(--figma-color-text-danger, #f24822);
      }

      /* ── Toggle ── */
      .toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--figma-color-text-secondary);
        cursor: pointer;
        user-select: none;
      }

      .toggle input {
        width: 14px;
        height: 14px;
        padding: 0;
        cursor: pointer;
        flex-shrink: 0;
      }

      /* ── Scan CTA ── */
      .scan-cta {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 20px 16px;
        border: 1.5px dashed var(--figma-color-border);
        border-radius: 8px;
        text-align: center;
      }

      .scan-cta p {
        margin: 0;
        font-size: 12px;
        color: var(--figma-color-text-secondary);
        line-height: 1.6;
      }

      /* ── Tabs (step 2) ── */
      .tabs {
        display: flex;
        border-bottom: 1px solid var(--figma-color-border);
        gap: 0;
        flex-shrink: 0;
      }

      .tab {
        padding: 7px 11px;
        font-size: 11px;
        font-weight: 500;
        color: var(--figma-color-text-secondary);
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        border-radius: 0;
        cursor: pointer;
        transition: color 120ms;
        margin-bottom: -1px;
      }

      .tab:hover:not(:disabled) {
        color: var(--figma-color-text);
        background: transparent;
      }

      .tab[data-active="true"] {
        color: var(--figma-color-text);
        border-bottom-color: var(--plugin-accent);
      }

      .tab-panel {
        display: none;
        flex: 1;
        overflow: hidden;
      }

      .tab-panel[data-active="true"] {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .step-panel--review {
        gap: 0;
        height: 100%;
      }

      .tab-panels-wrapper {
        flex: 1;
        overflow: hidden;
        padding-top: 12px;
      }

      /* ── Items list ── */
      .items {
        min-height: 140px;
        max-height: 400px;
        overflow-y: auto;
      }

      .group-section {
        margin-bottom: 6px;
      }

      .group-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 0;
        font-size: 11px;
        font-weight: 600;
        color: var(--figma-color-text-secondary);
        border-bottom: 1px solid var(--figma-color-border);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
        cursor: pointer;
        user-select: none;
      }

      .group-header:hover {
        color: var(--figma-color-text);
      }

      .group-body {
        display: grid;
        gap: 0;
      }

      .group-body.collapsed {
        display: none;
      }

      .item {
        display: grid;
        gap: 4px;
        padding: 7px 0;
        border-bottom: 1px solid var(--figma-color-border);
        font-size: 12px;
      }

      .item:last-child {
        border-bottom: none;
      }

      .item-line {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .item-main {
        display: grid;
        grid-template-columns: minmax(150px, 1.6fr) minmax(90px, 1fr) 28px 16px;
        align-items: center;
        gap: 8px;
        flex: 1;
      }

      .style-main {
        grid-template-columns: minmax(170px, 1.8fr) minmax(110px, 1fr) 28px;
      }

      .item-name-input {
        padding: 4px 7px;
        border-radius: 5px;
        font-size: 12px;
        font-weight: 500;
        background: var(--figma-color-bg-secondary);
        border: 1px solid var(--figma-color-border);
        color: var(--figma-color-text);
      }

      .item-name-input:focus {
        border-color: var(--plugin-accent);
        outline: none;
      }

      .item-value,
      .item-occurrences {
        color: var(--figma-color-text-secondary);
        font-size: 11px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .item-meta {
        display: flex;
        gap: 5px;
        align-items: center;
        flex-wrap: wrap;
      }

      .badge {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.03em;
        padding: 2px 6px;
        border-radius: 999px;
        background: var(--figma-color-bg-secondary);
        color: var(--figma-color-text-secondary);
        border: 1px solid var(--figma-color-border);
      }

      .badge-colors {
        background: rgba(242, 72, 34, 0.1);
        color: var(--figma-color-text-danger, #e54a26);
        border-color: rgba(242, 72, 34, 0.2);
      }

      .badge-texts {
        background: rgba(68, 136, 255, 0.1);
        color: #3a7be0;
        border-color: rgba(68, 136, 255, 0.2);
      }

      .badge-sizes {
        background: rgba(26, 127, 90, 0.1);
        color: var(--figma-color-text-success, #1a7f5a);
        border-color: rgba(26, 127, 90, 0.2);
      }

      .badge-style {
        background: rgba(160, 96, 224, 0.1);
        color: #9055cc;
        border-color: rgba(160, 96, 224, 0.2);
      }

      .color-chip {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        flex-shrink: 0;
      }

      /* ── Diagnostics ── */
      .diagnostics {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        font-size: 11px;
        color: var(--figma-color-text-secondary);
        padding-bottom: 8px;
        border-bottom: 1px solid var(--figma-color-border);
      }

      .diagnostics strong {
        color: var(--figma-color-text);
      }

      /* ── Action targets (step 3) ── */
      .target-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .target-card {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 10px 12px;
        border: 1.5px solid var(--figma-color-border);
        border-radius: 8px;
        background: var(--figma-color-bg-secondary);
        cursor: pointer;
        font-size: 12px;
        user-select: none;
        transition: border-color 120ms, background 120ms;
      }

      .target-card:has(input:checked) {
        border-color: var(--plugin-accent);
        background: var(--plugin-accent-subtle);
      }

      .target-card input {
        width: 14px;
        height: 14px;
        padding: 0;
        cursor: pointer;
        flex-shrink: 0;
      }

      /* ── Summary ── */
      .summary-text {
        font-size: 11px;
        color: var(--figma-color-text-secondary);
        margin: 0;
        line-height: 1.6;
      }

      /* ── Empty ── */
      .empty {
        color: var(--figma-color-text-secondary);
        font-size: 12px;
        padding: 24px 0;
        text-align: center;
        margin: 0;
      }

      /* ── Footer ── */
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 9px 12px;
        border-top: 1px solid var(--figma-color-border);
        flex-shrink: 0;
      }

      .footer-left,
      .footer-right {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      /* ── Toast ── */
      .toast {
        position: fixed;
        bottom: 54px;
        left: 12px;
        right: 12px;
        z-index: 100;
        padding: 9px 12px;
        border-radius: 7px;
        border: 1px solid var(--figma-color-border);
        background: var(--figma-color-bg-secondary);
        color: var(--figma-color-text);
        font-size: 12px;
        transform: translateY(6px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 130ms, transform 130ms;
      }

      .toast[data-visible="true"] {
        opacity: 1;
        transform: translateY(0);
      }

      .toast[data-level="success"] {
        border-color: var(--figma-color-text-success, #1a7f5a);
      }

      .toast[data-level="warning"] {
        border-color: var(--figma-color-text-warning, #f5a623);
      }

      .toast[data-level="error"] {
        border-color: var(--figma-color-text-danger, #f24822);
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar {
        width: 4px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: var(--figma-color-border);
        border-radius: 999px;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(0, 122, 122, 0.4);
        }
        100% {
          box-shadow: 0 0 0 7px rgba(0, 122, 122, 0);
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">

      <!-- Header -->
      <header class="header">
        <span class="header-title">Selection to Variables</span>
        <button class="btn-ghost" id="windowToggleButton" style="width:auto;padding:4px 8px;font-size:11px;">Maximize</button>
      </header>

      <!-- Stepper -->
      <div class="stepper">
        <div class="step" role="button" tabindex="0" aria-label="Step 1: Configure" data-step="1" data-state="active" id="step1Indicator">
          <div class="step-dot" aria-hidden="true">1</div>
          <span class="step-label">Configure</span>
        </div>
        <div class="step-connector" aria-hidden="true"></div>
        <div class="step" role="button" tabindex="0" aria-label="Step 2: Review" data-step="2" data-state="pending" id="step2Indicator">
          <div class="step-dot" aria-hidden="true">2</div>
          <span class="step-label">Review</span>
        </div>
        <div class="step-connector" aria-hidden="true"></div>
        <div class="step" role="button" tabindex="0" aria-label="Step 3: Create" data-step="3" data-state="pending" id="step3Indicator">
          <div class="step-dot" aria-hidden="true">3</div>
          <span class="step-label">Create</span>
        </div>
      </div>

      <!-- Content -->
      <div class="content">

        <!-- Step 1: Configure & Scan -->
        <div class="step-panel" data-step="1" data-active="true" id="stepPanel1">
          <div class="row-2">
            <div class="field">
              <label class="field-label" for="collectionSelect">Collection</label>
              <select id="collectionSelect"></select>
              <input class="hidden" id="newCollectionName" placeholder="Collection name" value="Selection Variables" />
            </div>
            <div class="field">
              <label class="field-label" for="modeSelect">Mode</label>
              <select id="modeSelect"></select>
              <input class="hidden" id="newModeName" placeholder="Mode name" value="Base" />
            </div>
          </div>

          <label class="toggle">
            <input id="repeatedOnly" type="checkbox" />
            Show repeated tokens only
          </label>

          <label class="toggle">
            <input id="autoScanSelection" type="checkbox" />
            Auto-refresh on selection change
          </label>

          <div class="status-bar">
            <span class="status-dot" data-state="idle" id="statusDot"></span>
            <span id="statusText" aria-live="polite" aria-atomic="true">Ready</span>
          </div>

          <div class="scan-cta">
            <p>Select Groups, Frames, or Sections in Figma, then scan to extract tokens.</p>
            <button class="btn-primary" data-loading="false" id="scanButton" style="width:auto;padding:8px 20px;">Scan selection</button>
          </div>

          <p class="summary-text" id="summary"></p>
        </div>

        <!-- Step 2: Review -->
        <div class="step-panel step-panel--review" data-step="2" id="stepPanel2">
          <nav class="tabs" role="tablist" aria-label="Token types">
            <button class="tab" role="tab" aria-selected="true" aria-controls="tabPanelVariables" data-tab="variables" data-active="true" id="tabVariables">Variables</button>
            <button class="tab" role="tab" aria-selected="false" aria-controls="tabPanelTextStyles" data-tab="text-styles" id="tabTextStyles">Text styles</button>
            <button class="tab" role="tab" aria-selected="false" aria-controls="tabPanelColorStyles" data-tab="color-styles" id="tabColorStyles">Color styles</button>
            <button class="tab" role="tab" aria-selected="false" aria-controls="tabPanelEffectStyles" data-tab="effect-styles" id="tabEffectStyles">Effect styles</button>
          </nav>

          <div class="tab-panels-wrapper">
            <div class="tab-panel" role="tabpanel" aria-labelledby="tabVariables" data-tab="variables" data-active="true" id="tabPanelVariables">
              <div class="items" id="items"></div>
            </div>

            <div class="tab-panel" role="tabpanel" aria-labelledby="tabTextStyles" data-tab="text-styles" id="tabPanelTextStyles">
              <div class="diagnostics" id="textStylesDiagnostics"></div>
              <div class="items" id="textStyles"></div>
            </div>

            <div class="tab-panel" role="tabpanel" aria-labelledby="tabColorStyles" data-tab="color-styles" id="tabPanelColorStyles">
              <div class="items" id="colorStyles"></div>
            </div>

            <div class="tab-panel" role="tabpanel" aria-labelledby="tabEffectStyles" data-tab="effect-styles" id="tabPanelEffectStyles">
              <div class="items" id="effectStyles"></div>
            </div>
          </div>
        </div>

        <!-- Step 3: Create -->
        <div class="step-panel" data-step="3" id="stepPanel3">
          <p class="summary-text">Choose what to create from the scanned tokens:</p>

          <div class="target-grid">
            <label class="target-card">
              <input type="checkbox" name="actionTarget" value="variables" checked />
              Variables
            </label>
            <label class="target-card">
              <input type="checkbox" name="actionTarget" value="text-styles" />
              Text styles
            </label>
            <label class="target-card">
              <input type="checkbox" name="actionTarget" value="color-styles" />
              Color styles
            </label>
            <label class="target-card">
              <input type="checkbox" name="actionTarget" value="effect-styles" />
              Effect styles
            </label>
          </div>

          <div>
            <button class="btn-ghost" id="exportButton" style="width:auto;">Export JSON</button>
          </div>
        </div>

      </div><!-- /content -->

      <!-- Footer -->
      <footer class="footer">
        <div class="footer-left">
          <button class="btn-ghost" id="backButton" style="display:none;">← Back</button>
        </div>
        <div class="footer-right">
          <button class="btn-ghost" id="createButton" data-loading="false" style="display:none;">Create</button>
          <button class="btn-primary" id="nextButton">Next →</button>
          <button class="btn-primary" id="createApplyButton" data-loading="false" style="display:none;">Create and apply</button>
        </div>
      </footer>

    </div><!-- /app -->

    <div class="toast" role="status" aria-live="polite" aria-atomic="true" data-level="info" data-visible="false" id="toast"></div>

    <!-- UI_SCRIPT -->
  </body>
</html>
